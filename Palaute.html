<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Asiakaspalaute</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

  :root {
    --bg-color: #f0f2f5;
    --card-bg: #ffffff;
    --text-main: #1d1d1f;
    --text-muted: #86868b;
    --primary-color: #0071e3;
    --success-color: #34c759;
    --neutral-color: #ff9f0a;
    --danger-color: #ff3b30;
    --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.08);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-color);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text-main);
    user-select: none;
    overflow: hidden;
  }

  .container {
    background: var(--card-bg);
    padding: 50px 40px;
    border-radius: 24px;
    box-shadow: var(--shadow-soft);
    width: 90%;
    max-width: 500px;
    text-align: center;
    opacity: 1;
    transform: scale(1);
    transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .container.hidden {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
    position: absolute;
  }

  h1 {
    font-weight: 700;
    font-size: 2rem;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }

  p.subtitle {
    color: var(--text-muted);
    font-size: 1.1rem;
    margin-bottom: 40px;
    font-weight: 300;
  }

  .emoji-row {
    display: flex;
    justify-content: space-around;
    gap: 20px;
  }

  .emoji-btn {
    font-size: 80px;
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
    filter: grayscale(20%);
  }

  .emoji-btn:hover {
    transform: scale(1.2) translateY(-10px);
    filter: grayscale(0%);
  }

  .emoji-btn:active {
    transform: scale(0.9);
  }

  #message-container {
    position: absolute;
    background: var(--card-bg);
    padding: 60px 40px;
    border-radius: 24px;
    box-shadow: var(--shadow-soft);
    width: 90%;
    max-width: 400px;
    text-align: center;
    opacity: 0;
    transform: scale(0.9) translateY(20px);
    transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #message-container.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  #message-container .icon {
    font-size: 60px;
    margin-bottom: 20px;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  #message {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 30px;
    letter-spacing: -0.5px;
  }

  .progress-container {
    width: 100%;
    height: 6px;
    background: #e5e5ea;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--primary-color);
    transition: width 2s linear;
  }

  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .dashboard {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(10px);
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 100;
  }

  .dashboard.active {
    opacity: 1;
    pointer-events: auto;
  }

  .dashboard-content {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 24px;
    width: 90%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    transform: translateY(30px);
    transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .dashboard.active .dashboard-content {
    transform: translateY(0);
  }

  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }

  .dashboard-header h2 {
    font-size: 1.8rem;
    font-weight: 700;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 30px;
  }

  .stat-card {
    background: #f5f5f7;
    padding: 20px;
    border-radius: 16px;
    text-align: center;
  }

  .stat-card .emoji {
    font-size: 2rem;
    margin-bottom: 10px;
  }

  .stat-card .number {
    font-size: 1.5rem;
    font-weight: 700;
  }

  .stat-card .percentage {
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .chart-container {
    background: #f5f5f7;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 30px;
    display: flex;
    justify-content: center;
  }

  h3 {
    font-size: 1.2rem;
    margin-bottom: 15px;
    color: var(--text-muted);
  }

  #feedbackList {
    list-style: none;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 10px;
  }

  #feedbackList::-webkit-scrollbar {
    width: 6px;
  }
  #feedbackList::-webkit-scrollbar-track {
    background: transparent;
  }
  #feedbackList::-webkit-scrollbar-thumb {
    background: #d1d1d6;
    border-radius: 10px;
  }

  #feedbackList li {
    background: #f5f5f7;
    margin-bottom: 10px;
    padding: 12px 16px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.95rem;
  }

  .feedback-time {
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .close-btn {
    background: var(--text-main);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 500;
    transition: background 0.2s;
  }

  .close-btn:hover {
    background: #333;
  }
</style>
</head>
<body>

  <div class="container" id="main">
    <h1>Miten onnistuimme?</h1>
    <p class="subtitle">Anna palautetta klikkaamalla emojia</p>
    <div class="emoji-row">
      <button class="emoji-btn" onclick="giveFeedback('😊')">😊</button>
      <button class="emoji-btn" onclick="giveFeedback('😐')">😐</button>
      <button class="emoji-btn" onclick="giveFeedback('😞')">😞</button>
    </div>
  </div>

  <div id="message-container">
    <div class="icon">🎉</div>
    <div id="message">Kiitos palautteesta!</div>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div id="dashboard" class="dashboard">
    <div class="dashboard-content">
      <div class="dashboard-header">
        <h2>Raportti</h2>
        <button class="close-btn" onclick="closeDashboard()">Sulje</button>
      </div>
      
      <div class="stats-grid" id="stats">
      </div>

      <div class="chart-container">
        <canvas id="chart" width="450" height="220"></canvas>
      </div>

      <h3>Viimeisimmät palautteet</h3>
      <ul id="feedbackList">
      </ul>
    </div>
  </div>

<script>
let feedbackHistory = [];

function giveFeedback(choice) {
  feedbackHistory.unshift({
    value: choice,
    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
  });

  const main = document.getElementById("main");
  const msgContainer = document.getElementById("message-container");
  const bar = document.getElementById("progressBar");

  main.classList.add("hidden");
  
  setTimeout(() => {
    msgContainer.classList.add("visible");
    
    setTimeout(() => {
      bar.style.width = "100%";
    }, 50);

  }, 400);

  setTimeout(() => {
    msgContainer.classList.remove("visible");
    bar.style.transition = "none";
    
    setTimeout(() => {
      bar.style.width = "0%";
      main.classList.remove("hidden");
      
      setTimeout(() => {
         bar.style.transition = "width 2s linear";
      }, 50);

    }, 500);
  }, 2500);
}

function openDashboard() {
  const dash = document.getElementById("dashboard");
  dash.style.display = "flex";
  setTimeout(() => dash.classList.add("active"), 10);
  updateDashboard();
}

function closeDashboard() {
  const dash = document.getElementById("dashboard");
  dash.classList.remove("active");
  setTimeout(() => dash.style.display = "none", 300);
}

document.addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "y") {
    openDashboard();
  }
});

function updateDashboard() {
  const list = document.getElementById("feedbackList");
  const statsBox = document.getElementById("stats");
  const chartCanvas = document.getElementById("chart");
  const ctx = chartCanvas.getContext("2d");

  list.innerHTML = "";
  if(feedbackHistory.length === 0) {
      list.innerHTML = "<li style='justify-content:center; color: #86868b;'>Ei palautteita vielä.</li>";
  } else {
      feedbackHistory.forEach((f) => {
        const li = document.createElement("li");
        li.innerHTML = `<span>Palaute: <strong>${f.value}</strong></span> <span class="feedback-time">${f.time}</span>`;
        list.appendChild(li);
      });
  }

  let good = feedbackHistory.filter(f => f.value === "😊").length;
  let neutral = feedbackHistory.filter(f => f.value === "😐").length;
  let bad = feedbackHistory.filter(f => f.value === "😞").length;
  let total = feedbackHistory.length || 1;

  statsBox.innerHTML = `
    <div class="stat-card">
      <div class="emoji">😊</div>
      <div class="number">${good}</div>
      <div class="percentage">${Math.round(good/total*100)}%</div>
    </div>
    <div class="stat-card">
      <div class="emoji">😐</div>
      <div class="number">${neutral}</div>
      <div class="percentage">${Math.round(neutral/total*100)}%</div>
    </div>
    <div class="stat-card">
      <div class="emoji">😞</div>
      <div class="number">${bad}</div>
      <div class="percentage">${Math.round(bad/total*100)}%</div>
    </div>
  `;

  ctx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);

  if (feedbackHistory.length === 0) return;

  const values = [good, neutral, bad];
  const colors = ["#34c759", "#ff9f0a", "#ff3b30"];
  const labels = ["😊", "😐", "😞"];
  
  const maxValue = Math.max(...values) || 1;
  const canvasHeight = chartCanvas.height;
  const paddingBottom = 40;
  const maxBarHeight = canvasHeight - paddingBottom - 30;

  const barWidth = 60;
  const totalBarsWidth = (barWidth * 3) + (40 * 2);
  const startX = (chartCanvas.width - totalBarsWidth) / 2;

  values.forEach((v, i) => {
    const x = startX + i * (barWidth + 40);
    const height = (v / maxValue) * maxBarHeight;
    const y = canvasHeight - paddingBottom - height;

    ctx.fillStyle = colors[i];
    ctx.beginPath();
    ctx.moveTo(x, canvasHeight - paddingBottom);
    ctx.lineTo(x, y + 10);
    ctx.quadraticCurveTo(x, y, x + 10, y);
    ctx.lineTo(x + barWidth - 10, y);
    ctx.quadraticCurveTo(x + barWidth, y, x + barWidth, y + 10);
    ctx.lineTo(x + barWidth, canvasHeight - paddingBottom);
    ctx.fill();

    ctx.fillStyle = "#1d1d1f";
    ctx.font = "24px Inter";
    ctx.textAlign = "center";
    ctx.fillText(labels[i], x + (barWidth / 2), canvasHeight - 10);

    if (v > 0) {
        ctx.fillStyle = "#1d1d1f";
        ctx.font = "bold 16px Inter";
        ctx.fillText(v, x + (barWidth / 2), y - 10);
    }
  });
}
</script>

</body>
</html>
